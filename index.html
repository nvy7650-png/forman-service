<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ - FORMAN Cắt tóc nam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav-bar">
        <div class="nav-bar_left">
            <div class="nav-bar_logo">FORMAN</div>
        </div>
        <div class="nav-bar_right">
            <button class="hamburger-menu" id="hamburgerMenu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-bar_menu" id="navMenu">
                <a href="#">Trang chủ</a>
                <a href="#" class="active">Dịch vụ</a>
                <a href="#">Khuyến mãi</a>
                <a href="#">Về chúng tôi</a>
                <div class="form_button">
                    <button class="btn-action">Đăng nhập</button>
                </div>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h1>Dịch vụ của FORMAN</h1>
        <p>Chuyên cắt tóc nam - Uốn - Nhuộm - Chăm sóc tóc cao cấp</p>
    </div>

    <div class="filter-section">
        <div class="filter-container">
            <button class="filter-btn active">Tất cả dịch vụ</button>
        </div>
    </div>

    <section class="services-section">
        <div class="services-grid" id="servicesGrid">
            <div id="loading">Đang tải dịch vụ và hình ảnh...</div>
        </div>
    </section>

    <button id="backToTop" class="back-to-top">↑</button>
    <a href="tel:1900272703" class="call-button">☎</a>

    <script>
        const API_BASE_URL = "https://webdatlichlamtoc.id.vn";

        // Hàm lấy danh sách phương tiện (ảnh/video) của một dịch vụ
        async function getPhuongTien(id_dich_vu) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/phuong-tiens/${id_dich_vu}`);
                if (!res.ok) return [];
                const data = await res.json();
                return data.data || data || [];
            } catch (e) {
                console.error("Lỗi lấy phương tiện:", e);
                return [];
            }
        }

        async function loadServices() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('servicesGrid');

            try {
                const res = await fetch(`${API_BASE_URL}/api/services`);
                const result = await res.json();

                loading.style.display = 'none';

                if (!result.status || !result.data) {
                    grid.innerHTML = `<p style="color:red;text-align:center;padding:40px;">Không tải được danh sách dịch vụ</p>`;
                    return;
                }

                grid.innerHTML = '';

                for (const service of result.data) {
                    // Lấy ảnh/video của dịch vụ này
                    const phuongtiens = await getPhuongTien(service.id);

                    // Lấy ảnh đầu tiên theo thứ tự thutu
                    let mediaHTML = `<img src="image/b1.jpg" alt="${service.tendichvu}" style="width:100%;height:230px;object-fit:cover;">`;
                    
                    if (phuongtiens.length > 0) {
                        // Sắp xếp theo thutu
                        phuongtiens.sort((a, b) => (a.thutu || 999) - (b.thutu || 999));
                        
                        const firstMedia = phuongtiens[0];
                        
                        if (firstMedia.loai === 'video' && firstMedia.url) {
                            mediaHTML = `<video src="${firstMedia.url}" controls style="width:100%;height:230px;object-fit:cover;"></video>`;
                        } else if (firstMedia.url) {
                            mediaHTML = `<img src="${firstMedia.url}" alt="${service.tendichvu}" style="width:100%;height:230px;object-fit:cover;">`;
                        }
                    }

                    const cardHTML = `
                        <div class="service-card">
                            ${mediaHTML}
                            <div class="service-info">
                                <h3>${service.tendichvu}</h3>
                                <p class="service-desc">${service.mota || 'Đang cập nhật mô tả...'}</p>
                                <p class="service-price">${Number(service.dongia).toLocaleString('vi-VN')} VND</p>
                                <button class="btn-action" onclick="datLich('${service.id}')">Đặt lịch ngay</button>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                }

            } catch (error) {
                console.error(error);
                loading.innerHTML = `<span style="color:red;">Không kết nối được với server</span>`;
            }
        }

        window.datLich = function(id) {
            alert(`Đã chọn dịch vụ ID: ${id}\nTính năng đặt lịch đang phát triển.`);
        };

        // Khởi chạy
        document.addEventListener('DOMContentLoaded', () => {
            loadServices();

            // Hamburger Menu
            const hamburger = document.getElementById('hamburgerMenu');
            const navMenu = document.getElementById('navMenu');
            if (hamburger && navMenu) {
                hamburger.addEventListener('click', () => navMenu.classList.toggle('show'));
            }
        });
    </script>
</body>
</html>
