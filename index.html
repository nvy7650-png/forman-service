<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ - FORMAN Cắt tóc nam</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="nav-bar">
        <div class="nav-bar_left">
            <div class="nav-bar_logo">FORMAN</div>
        </div>
        <div class="nav-bar_right">
            <button class="hamburger-menu" id="hamburgerMenu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-bar_menu" id="navMenu">
                <a href="#">Trang chủ</a>
                <a href="#" class="active">Dịch vụ</a>
                <a href="#">Khuyến mãi</a>
                <a href="#">Về chúng tôi</a>
                <div class="form_button">
                    <button class="btn-action">Đăng nhập</button>
                </div>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h1>Dịch vụ của FORMAN</h1>
        <p>Chuyên cắt tóc nam - Uốn - Nhuộm - Chăm sóc tóc cao cấp</p>
    </div>

    <div class="filter-section">
        <div class="filter-container">
            <button class="filter-btn active">Tất cả dịch vụ</button>
        </div>
    </div>

    <section class="services-section">
        <div class="services-grid" id="servicesGrid">
            <div id="loading">Đang tải dịch vụ và hình ảnh...</div>
        </div>
    </section>

    <button id="backToTop" class="back-to-top">↑</button>
    <a href="tel:1900272703" class="call-button">☎</a>

    <script>
        const API_BASE_URL = "https://webdatlichlamtoc.id.vn";

        async function getPhuongTien(id_dich_vu) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/phuong-tiens/${id_dich_vu}`);
                if (!res.ok) return [];
                const data = await res.json();
                return Array.isArray(data) ? data : (data.data || []);
            } catch (e) {
                return [];
            }
        }

        async function loadServices() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('servicesGrid');

            try {
                const res = await fetch(`${API_BASE_URL}/api/services`);
                const result = await res.json();

                loading.style.display = 'none';

                if (!result.status || !result.data) return;

                grid.innerHTML = '';

                for (const service of result.data) {
                    const phuongtiens = await getPhuongTien(service.id);

                    // ===================== PHẦN MEDIA ĐÃ SỬA =====================
                    let mediaHTML = `
                        <div class="media-wrapper">
                            <img src="image/b1.jpg" alt="${service.tendichvu}">
                        </div>
                    `;

                    if (phuongtiens.length > 0) {
                        phuongtiens.sort((a, b) => (a.thutu || 999) - (b.thutu || 999));
                        const first = phuongtiens[0];

                        if (first.link) {
                            if (first.loai === "VIDEO") {
                                mediaHTML = `
                                    <div class="media-wrapper">
                                        <video src="${first.link}" controls></video>
                                    </div>
                                `;
                            } else {
                                mediaHTML = `
                                    <div class="media-wrapper">
                                        <img src="${first.link}" alt="${service.tendichvu}">
                                    </div>
                                `;
                            }
                        }
                    }

                    const html = `
                        <div class="service-card">
                            ${mediaHTML}
                            <div class="service-info">
                                <h3>${service.tendichvu}</h3>
                                <p class="service-desc">${service.mota || 'Đang cập nhật...'}</p>
                                <p class="service-price">${Number(service.dongia).toLocaleString('vi-VN')} VND</p>
                                <button class="btn-action" onclick="datLich('${service.id}')">Đặt lịch ngay</button>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', html);
                }
            } catch (err) {
                loading.innerHTML = `<span style="color:red;">Không kết nối được với server</span>`;
            }
        }

        window.datLich = function(id) {
            alert(`Đã chọn dịch vụ ID: ${id}`);
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadServices();

            const ham = document.getElementById('hamburgerMenu');
            const menu = document.getElementById('navMenu');
            if (ham) ham.addEventListener('click', () => menu.classList.toggle('show'));
        });
    </script>
</body>
</html>
